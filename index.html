<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Axiom — Hero Concept</title>
<style>
  * { margin:0;padding:0;box-sizing:border-box; }
  body { background:#000;width:100vw;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center; }
  #dot {
    position:absolute;width:10px;height:10px;border-radius:50%;
    background:#00ff88;box-shadow:0 0 20px #00ff88,0 0 60px #00ff8866;
    opacity:0;
    z-index:10;
    transition: opacity 0.4s ease;
  }
  #dot.show  { animation: dotAppear 0.6s ease-out forwards; }
  #dot.hide  { animation: dotExpand 1.4s cubic-bezier(0.16,1,0.3,1) forwards; }
  @keyframes dotAppear {
    0%{opacity:0;transform:scale(0.2)}60%{opacity:1;transform:scale(1.3)}100%{opacity:1;transform:scale(1)}
  }
  @keyframes dotExpand {
    0%  {opacity:1;transform:scale(1);}
    25% {opacity:0;}
    100%{opacity:0;transform:scale(40);}
  }
  #canvas-wrap {
    position:absolute;opacity:0;
    overflow:visible;
    transition: opacity 1.8s cubic-bezier(0.16,1,0.3,1), filter 1.8s cubic-bezier(0.16,1,0.3,1);
  }
  #canvas-wrap.defocused {
    opacity: 0.22 !important;
    filter: blur(22px);
    animation: none !important;
  }
  #canvas-wrap.show {
    animation:orbReveal 1.4s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes orbReveal {
    0%{opacity:0;transform:scale(0.04)}100%{opacity:0.64;transform:scale(1)}
  }
  canvas{display:block}

  /* ── Copy overlay ── */
  #copy {
    position:absolute;
    z-index:20;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:16px;
    pointer-events:none;
    font-family: system-ui, -apple-system, sans-serif;
    transition: opacity 0.7s ease;
  }
  #copy.hidden { opacity:0; pointer-events:none; }

  /* ── Intake conversation ── */
  #intake {
    position:absolute;
    z-index:30;
    width: min(560px, 88vw);
    display:flex;
    flex-direction:column;
    gap:0;
    opacity:0;
    transform: translateY(20px);
    pointer-events:none;
    transition: opacity 0.7s ease 0.5s, transform 0.7s ease 0.5s;
    font-family: system-ui, -apple-system, sans-serif;
  }
  #intake.visible {
    opacity:1;
    transform: translateY(0);
    pointer-events:all;
  }
  #intake-ack {
    font-size: clamp(13px, 1.6vw, 17px);
    color: #3dff8fbb;
    font-weight:400;
    margin-bottom: 20px;
    opacity:0;
    min-height:1.4em;
    transition: opacity 0.4s ease;
  }
  #intake-ack.visible { opacity:1; }
  #intake-question {
    font-size: clamp(22px, 3.2vw, 38px);
    font-weight:700;
    color:#fff;
    line-height:1.3;
    letter-spacing:-0.02em;
    min-height:1.4em;
  }
  #intake-input-area {
    margin-top:28px;
    opacity:0;
    transition: opacity 0.5s ease;
  }
  #intake-input-area.visible { opacity:1; }
  #intake-input {
    width:100%;
    background:transparent;
    border:none;
    border-bottom:1px solid #3dff8f66;
    outline:none;
    color:#fff;
    font-size: clamp(17px, 2.2vw, 26px);
    font-weight:300;
    padding:8px 0 10px;
    caret-color:#3dff8f;
    letter-spacing:0.01em;
    transition: border-color 0.3s ease;
    font-family:inherit;
  }
  #intake-input:focus { border-color:#3dff8f; }
  #intake-input::placeholder { color:#3dff8f44; }
  #intake-hint {
    margin-top:10px;
    font-size:10px;
    letter-spacing:0.15em;
    color:#3dff8f55;
    text-transform:uppercase;
    transition: color 0.3s;
  }
  #intake-input:focus ~ #intake-hint { color:#3dff8faa; }
  #intake-steps {
    position:fixed;
    bottom:32px;
    left:0; right:0;
    display:flex;
    justify-content:center;
    gap:8px;
    pointer-events:none;
    opacity:0;
    transition: opacity 0.5s ease;
  }
  #intake-steps.visible { opacity:1; }
  .i-dot {
    width:5px; height:5px;
    border-radius:50%;
    background:#1e1e1e;
    transition: background 0.4s ease;
  }
  .i-dot.done   { background:#3dff8f55; }
  .i-dot.active { background:#3dff8f; }
  #status {
    font-size:11px;
    letter-spacing:0.22em;
    color:#3dff8f;
    opacity:0;
    transition:opacity 0.6s ease;
    text-transform:uppercase;
  }
  /* Hide all copy children except status when initiating, preserving layout */
  #copy.initiating > *:not(#status) {
    opacity: 0 !important;
    visibility: hidden;
    transition: opacity 0.6s ease !important;
  }
  #headline {
    font-size:clamp(36px,5vw,72px);
    font-weight:700;
    color:#fff;
    line-height:1.1;
    min-height:1.2em;
  }
  #headline span { color:#3dff8f; }
  #sub {
    font-size:clamp(14px,1.6vw,20px);
    color:rgba(255,255,255,0.75);
    opacity:0;
    transition:opacity 0.8s ease;
    font-weight:400;
  }
  #ready {
    font-size:clamp(12px,1.2vw,16px);
    color:rgba(255,255,255,1);
    opacity:0;
    transition:opacity 0.6s ease;
  }
  #btn {
    pointer-events:all;
    margin-top:8px;
    padding:14px 48px;
    border:none;
    background:#3dff8f;
    color:#000;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.22em;
    text-transform:uppercase;
    cursor:pointer;
    opacity:0;
    transition:opacity 0.6s ease;
    animation:btnPulse 2s ease-in-out infinite;
    animation-play-state:paused;
  }
  #btn.visible {
    opacity:1;
    animation-play-state:running;
  }
  #btn:hover { background:#5dffaa; }
  @keyframes btnPulse {
    0%,100%{ box-shadow:0 0 12px #3dff8f88, 0 0 30px #3dff8f44; }
    50%    { box-shadow:0 0 28px #3dff8fcc, 0 0 70px #3dff8f66; }
  }
  .cursor::after {
    content:'▋';
    animation:blink 0.55s step-end infinite;
    color:#3dff8f;
    margin-left:2px;
    font-weight:400;
  }
  @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }
</style>
</head>
<body>
<div id="dot"></div>
<div id="canvas-wrap"><canvas id="c"></canvas></div>

<div id="copy">
  <div id="status"></div>
  <div id="headline"></div>
  <div id="sub"></div>
  <div id="ready"></div>
  <button id="btn">Initiate</button>
</div>

<div id="intake">
  <div id="intake-ack"></div>
  <div id="intake-question" class="cursor"></div>
  <div id="intake-input-area">
    <input id="intake-input" type="text" autocomplete="off" spellcheck="false" placeholder="Type your answer...">
    <div id="intake-hint">Press Enter to continue</div>
  </div>
</div>
<div id="intake-steps"></div>
<script id="vert" type="x-shader/x-vertex">
uniform float uTime;
uniform float uPulse;
varying vec3 vNormal;
varying vec3 vViewPos;
varying vec3 vWorldNormal;

vec3 mod289v3(vec3 x){return x-floor(x*(1./289.))*289.;}
vec4 mod289v4(vec4 x){return x-floor(x*(1./289.))*289.;}
vec4 permute(vec4 x){return mod289v4((x*34.+1.)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1./6.,1./3.);
  const vec4 D=vec4(0.,.5,1.,2.);
  vec3 i=floor(v+dot(v,C.yyy));
  vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);
  vec3 l=1.-g;
  vec3 i1=min(g.xyz,l.zxy);
  vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;
  vec3 x2=x0-i2+C.yyy;
  vec3 x3=x0-D.yyy;
  i=mod289v3(i);
  vec4 p=permute(permute(permute(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
  float n_=0.142857142857;
  vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);
  vec4 y_=floor(j-7.*x_);
  vec4 x=x_*ns.x+ns.yyyy;
  vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);
  vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.+1.;
  vec4 s1=floor(b1)*2.+1.;
  vec4 sh=-step(h,vec4(0.));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
  vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);
  vec3 p1=vec3(a0.zw,h.y);
  vec3 p2=vec3(a1.xy,h.z);
  vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
  m=m*m;
  return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}

void main(){
  vec3 p=position;
  float t=uTime*0.22;

  // Domain warp: sample noise at a warped position for swirling folds
  vec3 q=vec3(
    snoise(p*0.7+vec3(t*.3,t*.2,t*.25)),
    snoise(p*0.7+vec3(t*.25,t*.35,t*.2)),
    snoise(p*0.7+vec3(t*.2,t*.28,t*.3))
  );
  // Just 2 octaves of very low frequency — large smooth bumps
  float n  = snoise(p*0.6 + q*0.5 + vec3(t*.4,t*.3,t*.35)) * 0.22;
       n += snoise(p*1.2 + q*0.3 + vec3(t*.3,t*.4,t*.25)) * 0.08;
  n *= uPulse;

  vec3 displaced = p + normal * n;

  // Normal perturbation — larger eps for smoother gradients
  float eps = 0.04;
  vec3 px=p+vec3(eps,0.,0.), py=p+vec3(0.,eps,0.), pz=p+vec3(0.,0.,eps);
  float nx=snoise(px*0.6+q*0.5+vec3(t*.4,t*.3,t*.35))*.22+snoise(px*1.2+q*0.3+vec3(t*.3,t*.4,t*.25))*.08;
  float ny=snoise(py*0.6+q*0.5+vec3(t*.4,t*.3,t*.35))*.22+snoise(py*1.2+q*0.3+vec3(t*.3,t*.4,t*.25))*.08;
  float nz=snoise(pz*0.6+q*0.5+vec3(t*.4,t*.3,t*.35))*.22+snoise(pz*1.2+q*0.3+vec3(t*.3,t*.4,t*.25))*.08;
  vec3 grad=vec3(nx-n,ny-n,nz-n)/eps;
  vec3 pertN=normalize(normal-grad*1.0);

  vNormal=normalize(normalMatrix*pertN);
  vec4 mvPos=modelViewMatrix*vec4(displaced,1.);
  vViewPos=-mvPos.xyz;
  gl_Position=projectionMatrix*mvPos;
}
</script>
<script id="frag" type="x-shader/x-fragment">
uniform sampler2D uMatcap;
varying vec3 vNormal;
varying vec3 vViewPos;

void main(){
  vec3 N=normalize(vNormal);
  vec3 V=normalize(vViewPos);

  // Matcap UV from view-space normal
  vec3 viewN=N;
  vec2 mcUV=viewN.xy*0.495+0.5;
  vec3 mc=texture2D(uMatcap,mcUV).rgb;

  // Smooth 3-stop color ramp: shadow → mid → highlight, all green
  float lum = dot(mc, vec3(0.299, 0.587, 0.114));
  vec3 shadow = vec3(0.02, 0.18, 0.09);
  vec3 mid    = vec3(0.08, 0.52, 0.24);
  vec3 bright = vec3(0.45, 0.88, 0.58);
  float t2 = smoothstep(0.0, 0.5, lum);
  float t3 = smoothstep(0.5, 1.0, lum);
  vec3 ramp = mix(shadow, mid, t2) + mix(vec3(0.), bright - mid, t3);
  vec3 tinted = mc * ramp * 1.1;
  tinted = max(tinted, shadow);  // floor: no blacks

  // Fresnel — subtle teal shift at silhouette edges
  float fresnel = pow(1.0 - max(dot(N,V), 0.0), 2.5);
  vec3 edgeColor = vec3(0.3, 0.9, 0.7) * fresnel * 0.35;

  // Two-layer specular: wide soft blob + tight sharp peak
  vec3 L = normalize(vec3(1.5, 2.5, 2.5));
  vec3 R = reflect(-L, N);
  float NdotR = max(dot(R, V), 0.0);
  float specSoft  = pow(NdotR, 18.0) * 0.5;   // wide soft glow
  float specSharp = pow(NdotR, 120.0) * 1.2;  // tight bright peak
  vec3 specColor = vec3(0.6, 1.0, 0.72) * (specSoft + specSharp);

  vec3 col = tinted + edgeColor + specColor;
  gl_FragColor=vec4(col,1.);
}
</script>

const size = Math.min(window.innerWidth, window.innerHeight) * 0.92;
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(size, size);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.z = 3;

const loader = new THREE.TextureLoader();
const matcapTex = loader.load(MATCAP);

const geo = new THREE.SphereGeometry(1, 128, 128);
const mat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:   { value: 0 },
    uPulse:  { value: 1 },
    uMatcap: { value: matcapTex },
  },
  vertexShader:   document.getElementById('vert').textContent,
  fragmentShader: document.getElementById('frag').textContent,
});
const mesh = new THREE.Mesh(geo, mat);
scene.add(mesh);

// Mouse-driven rotation
let velX = 0, velY = 0;
let lastMouseX = null, lastMouseY = null;
const DAMPING = 0.88;
const MOUSE_STRENGTH = 0.00048;
const BASE_Y = 0.003, BASE_X = 0.0012;

window.addEventListener('mousemove', (e) => {
  if (lastMouseX === null) { lastMouseX = e.clientX; lastMouseY = e.clientY; return; }
  const dx = e.clientX - lastMouseX;
  const dy = e.clientY - lastMouseY;
  velX += dy * MOUSE_STRENGTH;   // vertical mouse → X rotation
  velY += dx * MOUSE_STRENGTH;   // horizontal mouse → Y rotation
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
});

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  mat.uniforms.uTime.value = t;
  mat.uniforms.uPulse.value = 1.0;
  mesh.scale.setScalar(0.75);

  // Apply mouse velocity + damp toward base idle rotation
  mesh.rotation.x += velX + BASE_X;
  mesh.rotation.y += velY + BASE_Y;
  scene.rotation.z += 0.0005;
  velX *= DAMPING;
  velY *= DAMPING;

  renderer.render(scene, camera);
}
animate();
</script>
<script>
function typeWriter(el, text, speed, cb) {
  let i = 0;
  el.classList.add('cursor');
  const iv = setInterval(() => {
    i++;
    const partial = text.slice(0, i);
    el.innerHTML = partial.replace('Axiom', '<span>Axiom</span>');
    if (i >= text.length) {
      clearInterval(iv);
      el.classList.remove('cursor');
      if (cb) setTimeout(cb, 400);
    }
  }, speed);
}

function fadeIn(el, delay, cb) {
  setTimeout(() => {
    el.style.opacity = '1';
    if (cb) setTimeout(cb, 800);
  }, delay);
}

// ── Sequence ──────────────────────────────────────────
// 0. Flash cursor alone 3 times before any typing (~1.8s @ 0.55s per cycle)
const status = document.getElementById('status');
status.style.opacity = '1';
status.classList.add('cursor');  // show cursor with no text

setTimeout(() => {
  status.classList.remove('cursor'); // remove briefly to reset
  setTimeout(() => {
    // 1. Now start typing
    typeWriter(status, 'System Status: Awaiting Connection', 55, () => {

    // 2. Green dot appears 500ms after status finishes
    setTimeout(() => {
      document.getElementById('dot').classList.add('show');

      // 3. Dot expands INTO orb — both fire simultaneously
      setTimeout(() => {
        document.getElementById('dot').classList.remove('show');
        document.getElementById('dot').classList.add('hide');    // dot scales up + fades
        document.getElementById('canvas-wrap').classList.add('show'); // orb grows from same point

        // 4. Copy sequence starts after orb finishes (~1.6s)
        setTimeout(() => {
          typeWriter(document.getElementById('headline'), 'Welcome to Axiom.', 60, () => {
            const sub = document.getElementById('sub');
            sub.style.opacity = '1';
            sub.textContent = '';
            typeWriter(sub, "We're here to help you build the future.", 38, () => {
              const ready = document.getElementById('ready');
              ready.style.opacity = '1';
              ready.textContent = '';
              typeWriter(ready, 'Ready to begin for free?', 55, () => {
                document.getElementById('btn').classList.add('visible');
              });
            });
          });
        }, 1600);

      }, 1400);
    }, 500);

    });  // end typeWriter callback
  }, 50); // tiny gap before typing starts
}, 1800); // 1.8s = ~3 blink cycles at 0.55s each

// ── Initiate button ───────────────────────────────────
document.getElementById('btn').addEventListener('click', function() {
  // 1. Orb defocuses; all copy except #status fades out in place
  document.getElementById('canvas-wrap').classList.add('defocused');
  document.getElementById('copy').classList.add('initiating');

  // 2. After fade, strip "Awaiting Connection", type "Connected"
  const status = document.getElementById('status');
  setTimeout(() => {
    status.textContent = 'System Status: ';
    status.classList.add('cursor');

    const word = 'Connected';
    let i = 0;
    const iv = setInterval(() => {
      status.textContent = 'System Status: ' + word.slice(0, ++i);
      if (i >= word.length) {
        clearInterval(iv);
        status.classList.remove('cursor');

        // 3. Form loads
        setTimeout(startIntake, 600);
      }
    }, 55);
  }, 700);
});
</script>

<script>
// ── Intake conversation ───────────────────────────────
const intakeQuestions = [
  "What does your business do?",
  "Who are your customers?",
  "What's your biggest bottleneck right now?",
  "Which tools is your team currently using?",
  "What's your email address?"
];
const intakeAcks = [
  "Got it.",
  "Perfect.",
  "That's really helpful.",
  "Great.",
  "You're all set."
];

let intakeCurrent = 0;
let intakeTyping  = false;

function intakeTypeWriter(el, text, speed, cb) {
  intakeTyping = true;
  el.textContent = '';
  el.classList.add('cursor');
  let i = 0;
  const iv = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(iv);
      intakeTyping = false;
      el.classList.remove('cursor');
      if (cb) cb();
    }
  }, speed);
}

function buildStepDots() {
  const stepsEl = document.getElementById('intake-steps');
  stepsEl.innerHTML = '';
  intakeQuestions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'i-dot' + (i === 0 ? ' active' : '');
    d.id = 'idot-' + i;
    stepsEl.appendChild(d);
  });
}

function updateDots(index) {
  intakeQuestions.forEach((_, i) => {
    const d = document.getElementById('idot-' + i);
    if (!d) return;
    d.className = 'i-dot' + (i < index ? ' done' : i === index ? ' active' : '');
  });
}

function showIntakeQuestion(index) {
  const qEl   = document.getElementById('intake-question');
  const input = document.getElementById('intake-input');
  const area  = document.getElementById('intake-input-area');

  updateDots(index);
  area.classList.remove('visible');
  input.value = '';
  input.disabled = false;

  intakeTypeWriter(qEl, intakeQuestions[index], 38, () => {
    area.classList.add('visible');
    setTimeout(() => input.focus(), 50);
  });
}

function startIntake() {
  buildStepDots();
  document.getElementById('intake').classList.add('visible');
  document.getElementById('intake-steps').classList.add('visible');
  showIntakeQuestion(0);
}

document.getElementById('intake-input').addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (intakeTyping) return;

  const input  = document.getElementById('intake-input');
  const qEl    = document.getElementById('intake-question');
  const ackEl  = document.getElementById('intake-ack');
  const area   = document.getElementById('intake-input-area');
  const val    = input.value.trim();
  if (!val) return;

  input.disabled = true;
  area.classList.remove('visible');
  qEl.textContent = '';
  qEl.classList.remove('cursor');

  // Type ack with green cursor
  ackEl.classList.add('visible', 'cursor');
  const ackText = intakeAcks[intakeCurrent];
  intakeCurrent++;

  intakeTypeWriter(ackEl, ackText, 45, () => {
    setTimeout(() => {
      ackEl.classList.remove('visible');

      if (intakeCurrent < intakeQuestions.length) {
        setTimeout(() => {
          ackEl.textContent = '';
          showIntakeQuestion(intakeCurrent);
        }, 350);
      } else {
        // All done
        setTimeout(() => {
          ackEl.textContent = '';
          intakeQuestions.forEach((_, i) => {
            document.getElementById('idot-' + i).className = 'i-dot done';
          });
          intakeTypeWriter(qEl, "Analysing your responses...", 42, () => {});
        }, 350);
      }
    }, 500);
  });
});
</script>
